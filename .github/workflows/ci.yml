name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Package security test ───────────────────────────────────────────────────
  test-package-security:
    name: Package security (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make security test executable
        run: chmod +x tests/bash/test-package-security.sh

      - name: Run package security test
        run: bash tests/bash/test-package-security.sh

  # ── PowerShell / Pester tests (Windows) ─────────────────────────────────────
  test-windows:
    name: Pester tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester v5
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object Version -ge '5.0')) {
            Install-Module Pester -MinimumVersion 5.0 -Force -Scope CurrentUser
          }

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/ps'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'tests/results-windows.xml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: tests/results-windows.xml

  # ── Bash tests (Linux / macOS-compatible) ────────────────────────────────────
  test-bash:
    name: Bash tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make test scripts executable
        run: chmod +x tests/run-tests.sh tests/bash/*.sh

      - name: Run bash tests
        run: bash tests/run-tests.sh

  # ── Bash tests (macOS) ───────────────────────────────────────────────────────
  test-macos:
    name: Bash + Pester tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make test scripts executable
        run: chmod +x tests/run-tests.sh tests/bash/*.sh

      - name: Run all tests (bash + Pester)
        run: bash tests/run-tests.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results-mac
          path: tests/results-mac.xml

  # ── Release (main branch, push only, all tests green) ───────────────────────
  release:
    name: Queue release tag
    needs: [test-package-security, test-windows, test-bash, test-macos]
    if: >
      success() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create next release tag
        shell: bash
        run: |
          latest=$(git tag --list 'v*' --sort=-version:refname | head -1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi
          IFS='.' read -r major minor patch <<< "${latest#v}"
          patch=$((patch + 1))
          new_ver="${major}.${minor}.${patch}"
          new_tag="v${new_ver}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$new_tag"
          git push origin "$new_tag"

  # ── Auto-revert on test failure (main branch only) ───────────────────────────
  auto-revert:
    name: Auto-revert on failure
    needs: [test-package-security, test-windows, test-bash, test-macos]
    if: |
      failure() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if this commit is already a revert
        id: guard
        run: |
          msg=$(git log -1 --pretty=%s)
          if [[ "$msg" == Revert* ]]; then
            echo "This commit is already a revert — skipping auto-revert to avoid a loop."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Revert and push
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git revert HEAD --no-edit
          git push
