name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Explicit tag push — use the tag as-is
            echo "ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ver=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Push to main — auto-bump patch from latest release tag
            latest=$(git tag --list 'v*' --sort=-version:refname | head -1)
            if [ -z "$latest" ]; then
              latest="v0.0.0"
            fi
            IFS='.' read -r major minor patch <<< "${latest#v}"
            patch=$((patch + 1))
            new_ver="${major}.${minor}.${patch}"
            new_tag="v${new_ver}"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$new_tag"
            git push origin "$new_tag"
            echo "ver=${new_ver}" >> "$GITHUB_OUTPUT"
            echo "tag=${new_tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          $url = 'https://jrsoftware.org/download.php/is.exe'
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\innosetup.exe"
          Start-Process "$env:TEMP\innosetup.exe" -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART' -Wait
          Add-Content $env:GITHUB_PATH 'C:\Program Files (x86)\Inno Setup 6'

      - name: Build installer
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.ver }}'
          powershell -ExecutionPolicy Bypass -File installer\build-installer.ps1 -Version $ver

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TIAN ${{ steps.version.outputs.tag }}
          files: installer/dist/tian-setup-${{ steps.version.outputs.ver }}.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
