name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "ver=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          $url = 'https://jrsoftware.org/download.php/is.exe'
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\innosetup.exe"
          Start-Process "$env:TEMP\innosetup.exe" -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART' -Wait
          Add-Content $env:GITHUB_PATH 'C:\Program Files (x86)\Inno Setup 6'

      - name: Build installer
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.ver }}'
          powershell -ExecutionPolicy Bypass -File installer\build-installer.ps1 -Version $ver

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TIAN ${{ steps.version.outputs.tag }}
          files: installer/dist/tian-setup-${{ steps.version.outputs.ver }}.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
