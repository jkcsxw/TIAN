name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Explicit tag push — use the tag as-is
            echo "ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ver=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            tag=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" --list 'v*' --sort=-version:refname | head -1)
            if [ -z "$tag" ]; then
              echo "No release tag found for commit ${{ github.event.workflow_run.head_sha }}" >&2
              exit 1
            fi
            echo "ver=${tag#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported event: ${{ github.event_name }}" >&2
            exit 1
          fi

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          $url = 'https://jrsoftware.org/download.php/is.exe'
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\innosetup.exe"
          Start-Process "$env:TEMP\innosetup.exe" -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART' -Wait
          Add-Content $env:GITHUB_PATH 'C:\Program Files (x86)\Inno Setup 6'

      - name: Restore code-signing certificate
        if: ${{ secrets.WINDOWS_CERT_PFX_BASE64 != '' }}
        id: codesign
        shell: pwsh
        env:
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'windows-codesign.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))
          "path=$certPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build installer
        shell: pwsh
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $ver = '${{ steps.version.outputs.ver }}'
          $buildArgs = @(
            '-Version', $ver
          )

          if ('${{ steps.codesign.outputs.path }}') {
            $buildArgs += @(
              '-Sign',
              '-CertificatePath', '${{ steps.codesign.outputs.path }}',
              '-CertificatePassword', $env:WINDOWS_CERT_PASSWORD
            )
          }

          & .\installer\build-installer.ps1 @buildArgs

      - name: Remove code-signing certificate
        if: ${{ always() && steps.codesign.outputs.path != '' }}
        shell: pwsh
        run: |
          Remove-Item '${{ steps.codesign.outputs.path }}' -Force -ErrorAction SilentlyContinue

      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.ver }}'
          $distDir = Join-Path $env:GITHUB_WORKSPACE 'installer\dist'
          $versionedExe = Join-Path $distDir "tian-setup-$ver.exe"
          $stableExe = Join-Path $distDir 'tian-setup.exe'

          if (-not (Test-Path $versionedExe)) {
            throw "Expected installer asset not found: $versionedExe"
          }

          Copy-Item $versionedExe $stableExe -Force

          "versioned=$versionedExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "stable=$stableExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TIAN ${{ steps.version.outputs.tag }}
          files: |
            ${{ steps.assets.outputs.versioned }}
            ${{ steps.assets.outputs.stable }}
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
